<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon" />
    <title>Tour</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="container navbar-flex">
        <img src="./assets/logo.png" alt="" class="logo" />
        <div class="main-menu">
          <ul class="main-menu-list">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#tours">Tours</a></li>
          </ul>
          <ul class="main-menu-icons">
            <li>
              <a
                href="http://www.facebook.com"
                target="_blank"
                class="nav-icon"
              >
                <i class="fa-brands fa-facebook"></i
              ></a>
            </li>
            <li>
              <a
                href="http://www.instagram.com"
                target="_blank"
                class="nav-icon"
              >
                <i class="fa-brands fa-instagram"></i
              ></a>
            </li>
            <li>
              <a href="http://www.twitter.com" target="_blank" class="nav-icon">
                <i class="fa-brands fa-twitter"></i
              ></a>
            </li>
          </ul>
        </div>
        <div class="mobile-menu">
          <div class="mobile-menu-toggle">
            <i class="fa-solid fa-bars"></i>
          </div>
          <div class="mobile-menu-items">
            <ul class="mobile-menu-list">
              <li><a href="#home">Home</a></li>
              <li><a href="#about">About</a></li>
              <li><a href="#services">Services</a></li>
              <li><a href="#tours">Tours</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
    <section class="hero" id="home"></section>
    <section class="section about" id="about"></section>
    <section class="section services" id="services"></section>
    <section class="section tours" id="tours"></section>
    <footer class="section footer">
      <ul class="footer-menu-list">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#tours">Tours</a></li>
      </ul>
      <ul class="footer-menu-icons">
        <li>
          <a href="http://www.facebook.com" target="_blank" class="nav-icon">
            <i class="fa-brands fa-facebook"></i
          ></a>
        </li>
        <li>
          <a href="http://www.instagram.com" target="_blank" class="nav-icon">
            <i class="fa-brands fa-instagram"></i
          ></a>
        </li>
        <li>
          <a href="http://www.twitter.com" target="_blank" class="nav-icon">
            <i class="fa-brands fa-twitter"></i
          ></a>
        </li>
      </ul>
      <p>
        Copyright &copy; Aaron travel tours company<span id="date"></span>all
        rights reserved
      </p>
    </footer>
    <script src="./js/script.js"></script>
  </body>
</html>
